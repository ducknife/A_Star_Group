services:
  - type: web
    name: astarsquad-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_DEFAULT_USERNAME
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_DEFAULT
        sync: false
      - key: EMAIL_PASSWORD_APP
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
