spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:astarsquad}
    username: ${DB_USERNAME:astarsquad}
    password: ${DB_PASSWORD:astarsquad}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_DEFAULT}
    password: ${EMAIL_PASSWORD_APP}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  # Render (and most PaaS) inject PORT at runtime; SERVER_PORT/8080 remain the local/Docker default.
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    # Dev-only default secret — MUST be overridden via JWT_SECRET env var in production.
    secret: ${JWT_SECRET:astarsquad-dev-only-secret-key-please-change-in-production-0123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  admin:
    username: ${ADMIN_DEFAULT_USERNAME:admin}
    password: ${ADMIN_DEFAULT_PASSWORD:ChangeMe123!}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  mail:
    from: ${EMAIL_DEFAULT}
    contact-recipient: ${EMAIL_DEFAULT}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.astarsquad.backend: INFO
