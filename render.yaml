databases:
  - name: astarsquad-db
    plan: free
    databaseName: astarsquad
    user: astarsquad

services:
  - type: web
    name: astarsquad-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      # Wired automatically from the "astarsquad-db" database above — no manual entry needed.
      - key: DB_HOST
        fromDatabase:
          name: astarsquad-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: astarsquad-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: astarsquad-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: astarsquad-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: astarsquad-db
          property: password

      # Generated automatically by Render — no manual entry needed.
      - key: JWT_SECRET
        generateValue: true

      # You'll be prompted to fill these in when applying the Blueprint
      # (values come from your local .env — Cloudinary dashboard, Gmail App Password, etc).
      - key: ADMIN_DEFAULT_USERNAME
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_DEFAULT
        sync: false
      - key: RESEND_API_KEY
        sync: false

      # Defaults to localhost so the first deploy still boots; update to your
      # real Vercel domain afterwards (Render dashboard → Environment).
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173
