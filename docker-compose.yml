services:
  postgres:
    image: postgres:16-alpine
    container_name: astarsquad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astarsquad
      POSTGRES_USER: astarsquad
      POSTGRES_PASSWORD: astarsquad
    ports:
      - "5432:5432"
    volumes:
      - astarsquad-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astarsquad"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: astarsquad-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: astarsquad
      DB_USERNAME: astarsquad
      DB_PASSWORD: astarsquad
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_DEFAULT: ${EMAIL_DEFAULT}
      EMAIL_PASSWORD_APP: ${EMAIL_PASSWORD_APP}
      CORS_ALLOWED_ORIGINS: http://localhost:8081
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: astarsquad-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  astarsquad-pgdata:
